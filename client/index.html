<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AgroSense — Smart soil monitoring and irrigation control dashboard for IoT systems." />
    <title>AgroSense</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Apply saved theme BEFORE React renders to prevent flash of wrong theme -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('agrosense_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
